<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="main">
    <h1>AI Prompt Generator</h1>
    <p id="explain">To use this simply type your prompt and click 'refine' <br> to get the refined prompt.</p>
    <form method="post">
        <input type="text" name="inp" placeholder="Enter prompt"> <br>
        <input type="password" name="key" placeholder="Enter Pollinations API key"> <br>
        <button name="btn" type="submit">Refine</button>
    </form>
    {%if message%}
       <p id="output">{{message}}</p>
    {%endif%}
    </div>
    <div id="lower">
        <img src="https://img.shields.io/badge/Built%20with-Pollinations.ai-8a2be2?style=for-the-badge" alt="">

    </div>
    <style>
        body{
            font-family: 'roboto';
            align-items: center;
            justify-content: center;
            display: flex;
            flex-direction: column;
            background-color: #e5e5f7;
            opacity: 0.8;
            background-image:  linear-gradient(#444cf7 1px, transparent 1px), linear-gradient(to right, #444cf7 1px, #e5e5f7 1px);
            background-size: 20px 20px;
        }
        #main{
            margin-top: 100px;
            box-shadow: 1px 1px 5px ;
            height: 400px;
            border-radius: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-width: 100px;
            min-height: 300px;
            backdrop-filter: blur(10px);          /* Blurs what is UNDER the element */
            -webkit-backdrop-filter: blur(10px);  /* Required for Safari support */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        #explain{
            color: rgb(2, 50, 138);
        }
        input{
            padding: 10px;
            width: 500px;
            position: relative;
            top: 5px;
        }
        button{
            padding: 10px;
            width: 80px;
            background-color: lightcoral;
            border: 0;
            border-radius: 5px;
            position: relative;
            top: 10px;
            margin-bottom: 20px;
        }
        #output{
            color: black;
        }
        img{
            margin-top: 50px;
            opacity: 0.9;
        }
    </style>
</body>
</html>
